<div class="container">

            <small id="q-count" class="text-muted mb-2 d-block"></small>
            <h5 id="question" class="mb-4"></h5>
            <div id="options"></div>
            <div id="feedback" class="mt-3 p-3 rounded d-none border"></div>
            <div class="nav-buttons">

                <button id="next-btn" class="btn btn-primary flex-grow-1 d-none" onclick="nextQuestion()">Next</button>
            </div>
        </div>

    </div>
</div>

function parseData(raw) {
    if (!raw || raw.includes("PASTE SET")) return [];
    // Regex /\r?\n/ splits by either Windows (\r\n) or Mac/Unix (\n) line endings
    return raw.trim().split(/\r?\n/).filter(line => line.includes('|')).map(line => {
        const parts = line.split('|');
        if (parts.length < 7) return null;
        const [q, a, b, c, d, correct, exp, ref] = parts;
        return { q, options: [a, b, c, d], correct: parseInt(correct), exp, ref: ref || "CSI Textbook" };
    }).filter(x => x !== null);
}

// --- APP LOGIC ---
const allData = { 1: parseData(set1Raw), 2: parseData(set2Raw), 3: parseData(set3Raw) };
let activeSet = null; let quizData = []; let currentIdx = 0; let score = 0; let answers = [];

function startSet(setNum) {
    activeSet = setNum;
    if (allData[setNum].length === 0) { alert("Set " + setNum + " is empty! Please paste the questions in the code."); return; }
    const saved = localStorage.getItem('fp1_v3_set_' + setNum);
    if (saved) {
        const state = JSON.parse(saved);
        quizData = state.quizData; currentIdx = state.currentIdx; score = state.score; answers = state.answers;
    } else {
        quizData = [...allData[setNum]].sort(() => Math.random() - 0.5);
        currentIdx = 0; score = 0; answers = []; saveState();
    }
    document.getElementById("selection-ui").classList.add("d-none");
    document.getElementById("quiz-ui").classList.remove("d-none");
    showQuestion();
}

function showQuestion() {
    const data = quizData[currentIdx];
    document.getElementById("q-count").innerText = "Question " + (currentIdx + 1) + " of " + quizData.length;
    document.getElementById("question").innerText = data.q;
    document.getElementById("progress-bar").style.width = ((currentIdx / quizData.length) * 100) + "%";
    document.getElementById("info-trigger").onclick = () => alert("Study Ref: " + data.ref);
    const box = document.getElementById("options"); box.innerHTML = "";
    data.options.forEach((opt, i) => {
        const btn = document.createElement("button"); btn.className = "btn-option"; btn.innerText = opt;
        btn.onclick = () => select(i, btn);
        if (answers[currentIdx] !== undefined) {
            btn.disabled = true;
            if (i === data.correct) btn.classList.add("correct");
            if (i === answers[currentIdx] && i !== data.correct) btn.classList.add("wrong");
        }
        box.appendChild(btn);
    });
    if (answers[currentIdx] !== undefined) {
        const fb = document.getElementById("feedback"); fb.classList.remove("d-none", "alert-success", "alert-danger");
        fb.classList.add(answers[currentIdx] === data.correct ? "alert-success" : "alert-danger");
        fb.innerHTML = "<strong>" + (answers[currentIdx] === data.correct ? 'Correct!' : 'Incorrect') + "</strong><br><small>" + data.exp + "</small>";
        document.getElementById("next-btn").classList.remove("d-none");
    } else { document.getElementById("feedback").classList.add("d-none"); document.getElementById("next-btn").classList.add("d-none"); }
}

function select(idx, btn) {
    if (answers[currentIdx] !== undefined) return;
    answers[currentIdx] = idx; if (idx === quizData[currentIdx].correct) score++;
    saveState(); showQuestion();
}

function nextQuestion() {
    if (currentIdx < quizData.length - 1) { currentIdx++; saveState(); showQuestion(); }
    else { document.getElementById("quiz-ui").classList.add("d-none"); document.getElementById("result-ui").classList.remove("d-none");
           document.getElementById("score-text").innerText = score + " / " + quizData.length; }
}

function prevQuestion() { if (currentIdx > 0) { currentIdx--; showQuestion(); } }
function goHome() { document.getElementById("selection-ui").classList.remove("d-none"); document.getElementById("quiz-ui").classList.add("d-none"); updateMenu(); }
function saveState() { localStorage.setItem('fp1_v3_set_' + activeSet, JSON.stringify({ quizData, currentIdx, score, answers })); }
function resetCurrentSet() { if (confirm("Redo this set?")) { localStorage.removeItem('fp1_v3_set_' + activeSet); startSet(activeSet); } }
function resetAll() { if (confirm("Wipe all progress?")) { localStorage.clear(); location.reload(); } }

function updateMenu() {
    [1,2,3].forEach(n => {
        const s = localStorage.getItem('fp1_v3_set_' + n);
        if (s) { const state = JSON.parse(s); const p = Math.round((state.answers.filter(x => x !== undefined).length / state.quizData.length) * 100);
                 document.getElementById("progress-" + n).innerText = p + "% Done"; }
    });
}
updateMenu();
</script>
